<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <meta name="theme-color" content="#000000">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <title>精确记账 PWA</title>
  <style>
    /* =========================================
       1. Token System & Base Setup
       ========================================= */
    :root {
      --bg-base: #050505;
      --glass-bg: rgba(255, 255, 255, 0.07);
      --glass-border: rgba(255, 255, 255, 0.12);
      --text-main: #FFFFFF;
      --text-muted: rgba(255, 255, 255, 0.45);
      --accent-blue: #0A84FF;
      --accent-green: #32D74B;
      --accent-red: #FF453A;
      --font-stack: -apple-system, BlinkMacSystemFont, "SF Pro Display", "SF Pro Text", sans-serif;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
    
    body {
      font-family: var(--font-stack);
      background-color: var(--bg-base);
      color: var(--text-main);
      overflow: hidden;
      height: 100dvh;
      display: flex;
      flex-direction: column;
      user-select: none;
    }

    /* Ambient Light Background */
    .ambient-bg {
      position: fixed;
      top: 0; left: 0; width: 100vw; height: 100vh;
      z-index: -1;
      overflow: hidden;
    }
    .orb {
      position: absolute; border-radius: 50%; filter: blur(90px); opacity: 0.55;
      animation: float 25s infinite alternate cubic-bezier(0.3, 0, 0.2, 1);
    }
    .orb-1 { width: 70vw; height: 70vw; background: var(--accent-blue); top: -15%; left: -15%; }
    .orb-2 { width: 60vw; height: 60vw; background: var(--accent-green); bottom: -15%; right: -15%; animation-delay: -7s; }
    @keyframes float { 0% { transform: translate(0, 0) scale(1); } 100% { transform: translate(15vw, 15vh) scale(1.15); } }

    /* Glassmorphism Standard */
    .glass-panel {
      background: var(--glass-bg);
      backdrop-filter: blur(25px); -webkit-backdrop-filter: blur(25px);
      border: 1px solid var(--glass-border);
    }

    /* Typography & Hierarchy */
    .text-huge { font-size: 42px; font-weight: 800; letter-spacing: -1px; }
    .text-body { font-size: 15px; color: var(--text-muted); }
    
    /* View Navigation Matrix */
    .view-container { flex: 1; position: relative; overflow: hidden; }
    .view {
      position: absolute; top: 0; left: 0; width: 100%; height: 100%;
      padding: 50px 24px; display: flex; flex-direction: column;
      opacity: 0; pointer-events: none;
      transform: scale(0.98);
      transition: opacity 0.35s ease, transform 0.35s cubic-bezier(0.1, 1, 0.1, 1);
    }
    .view.active { opacity: 1; pointer-events: auto; transform: scale(1); }

    /* Header Bar */
    .nav-header { display: flex; justify-content: space-between; align-items: center; width: 100%; margin-bottom: 30px; }
    .icon-btn {
      width: 40px; height: 40px; border-radius: 50%;
      display: flex; justify-content: center; align-items: center;
      font-size: 20px; color: var(--text-main); cursor: pointer;
    }

    /* =========================================
       2. PIN Screen
       ========================================= */
    #view-pin { justify-content: center; align-items: center; }
    .pin-display { display: flex; gap: 24px; margin: 40px 0 60px; }
    .pin-dot { width: 14px; height: 14px; border-radius: 50%; background: var(--glass-border); transition: background 0.2s; }
    .pin-dot.filled { background: var(--text-main); box-shadow: 0 0 10px rgba(255,255,255,0.5); }
    .keypad { display: grid; grid-template-columns: repeat(3, 1fr); gap: 20px; width: 100%; max-width: 300px; }
    .key {
      aspect-ratio: 1; border-radius: 50%; display: flex; justify-content: center; align-items: center;
      font-size: 26px; font-weight: 400; transition: background 0.1s;
    }
    .key:active { background: rgba(255,255,255,0.15); }

    /* =========================================
       3. Main Record Screen
       ========================================= */
    #view-record { justify-content: space-between; align-items: center; }
    .hero-title-area { text-align: center; margin-top: 40px; }
    .center-interact { display: flex; flex-direction: column; align-items: center; gap: 30px; margin-bottom: 80px; }
    
    .record-btn {
      width: 150px; height: 150px; border-radius: 50%;
      display: flex; justify-content: center; align-items: center;
      font-size: 17px; font-weight: 600; cursor: pointer;
      box-shadow: 0 20px 40px rgba(0,0,0,0.4);
      transition: transform 0.2s, border-color 0.3s;
    }
    .record-btn:active { transform: scale(0.94); }
    .record-btn.recording {
      border-color: rgba(255, 69, 58, 0.6);
      animation: pulse-red 1.8s infinite cubic-bezier(0.4, 0, 0.6, 1);
    }
    @keyframes pulse-red {
      0%, 100% { box-shadow: 0 0 0 0 rgba(255, 69, 58, 0.4); }
      50% { box-shadow: 0 0 0 35px rgba(255, 69, 58, 0); }
    }

    .manual-trigger {
      padding: 12px 28px; border-radius: 20px; font-size: 14px; font-weight: 500;
      color: var(--text-muted); cursor: pointer; transition: color 0.2s;
    }
    .manual-trigger:active { color: var(--text-main); }

    /* =========================================
       4. iOS Bottom Sheet (Confirmation Form)
       ========================================= */
    .bottom-sheet {
      position: fixed; bottom: -100%; left: 0; width: 100%;
      border-radius: 30px 30px 0 0; padding: 32px 24px 50px;
      z-index: 100;
      transition: bottom 0.4s cubic-bezier(0.15, 0.85, 0.3, 1);
    }
    .bottom-sheet.show { bottom: 0; }
    .sheet-handle { width: 36px; height: 5px; background: rgba(255,255,255,0.2); border-radius: 3px; margin: -16px auto 24px; }
    
    .input-group { display: flex; flex-direction: column; gap: 8px; margin-bottom: 20px; }
    .input-group label { font-size: 13px; color: var(--text-muted); font-weight: 500; text-transform: uppercase; }
    
    /* Elegant Custom Premium Inputs */
    .glass-input {
      background: rgba(255, 255, 255, 0.05);
      border: 1px solid var(--glass-border);
      border-radius: 14px; padding: 16px;
      color: var(--text-main); font-size: 17px; font-family: var(--font-stack);
      outline: none; transition: border-color 0.2s;
    }
    .glass-input:focus { border-color: var(--accent-blue); }
    
    .button-row { display: flex; gap: 16px; margin-top: 12px; }
    .btn {
      flex: 1; padding: 16px; border-radius: 14px; font-size: 16px; font-weight: 600;
      text-align: center; cursor: pointer; border: none; transition: background 0.2s, transform 0.1s;
    }
    .btn:active { transform: scale(0.97); }
    .btn-primary { background: var(--text-main); color: #000; }
    .btn-secondary { background: rgba(255,255,255,0.1); color: var(--text-main); }

    /* =========================================
       5. Dashboard View (Backend)
       ========================================= */
    .chart-container { width: 100%; height: 160px; margin: 30px 0 10px; position: relative; }
    svg.trend-line { width: 100%; height: 100%; overflow: visible; }
    polyline {
      fill: none; stroke: var(--accent-blue); stroke-width: 3.5;
      stroke-linecap: round; stroke-linejoin: round;
      filter: drop-shadow(0 6px 12px rgba(10, 132, 255, 0.45));
    }
    
    .recent-list { flex: 1; display: flex; flex-direction: column; gap: 12px; overflow-y: auto; margin-top: 16px; padding-bottom: 40px; }
    .list-item {
      display: flex; justify-content: space-between; align-items: center;
      padding: 18px; border-radius: 18px;
    }
    .item-actions { display: flex; gap: 14px; align-items: center; margin-left: 12px; }
    .action-icon { font-size: 14px; cursor: pointer; padding: 6px; border-radius: 6px; transition: background 0.2s; }
    .action-edit { color: var(--accent-blue); }
    .action-delete { color: var(--accent-red); }
    .action-icon:active { background: rgba(255,255,255,0.1); }
  </style>
</head>
<body>

  <div class="ambient-bg">
    <div class="orb orb-1"></div>
    <div class="orb orb-2"></div>
  </div>

  <div class="view-container">
    
    <div id="view-pin" class="view active">
      <div id="pin-message" class="text-body">请输入安全校验码</div>
      <div class="pin-display">
        <div class="pin-dot"></div><div class="pin-dot"></div><div class="pin-dot"></div><div class="pin-dot"></div>
      </div>
      <div class="keypad">
        <div class="key" onclick="inputPin(1)">1</div><div class="key" onclick="inputPin(2)">2</div><div class="key" onclick="inputPin(3)">3</div>
        <div class="key" onclick="inputPin(4)">4</div><div class="key" onclick="inputPin(5)">5</div><div class="key" onclick="inputPin(6)">6</div>
        <div class="key" onclick="inputPin(7)">7</div><div class="key" onclick="inputPin(8)">8</div><div class="key" onclick="inputPin(9)">9</div>
        <div class="key" style="font-size:14px; color:var(--text-muted);" onclick="clearPin()">清除</div>
        <div class="key" onclick="inputPin(0)">0</div>
        <div></div>
      </div>
    </div>

    <div id="view-record" class="view">
      <div class="nav-header">
        <div style="font-size: 20px; font-weight: 700;">记账终端</div>
        <div class="glass-panel icon-btn" onclick="goToDashboard()">⚙</div>
      </div>
      
      <div class="hero-title-area">
        <div class="text-body" style="margin-bottom: 6px;">今天想记录点什么？</div>
        <div style="font-size: 14px; color: var(--accent-blue);">声波捕捉精准隔离技术已就绪</div>
      </div>

      <div class="center-interact">
        <div id="record-btn" class="glass-panel record-btn" onclick="handleRecordClick()">
          <span id="record-text">轻触开始</span>
        </div>
        <div class="glass-panel manual-trigger" onclick="openInputSheet(false)">手动输入账目</div>
      </div>
      <div></div>
    </div>

    <div id="view-dashboard" class="view">
      <div class="nav-header">
        <div class="glass-panel icon-btn" onclick="goBackToRecord()">✕</div>
        <div style="font-size: 18px; font-weight: 600;">数据透视后台</div>
        <div class="action-icon" style="color:var(--text-muted)" onclick="lockApp()">锁定</div>
      </div>

      <div class="text-body">当月总支出流水</div>
      <div id="total-expense-display" class="text-huge" style="margin-top: 4px;">¥ 0.00</div>
      
      <div class="chart-container">
        <svg class="trend-line" viewBox="0 0 300 100" preserveAspectRatio="none">
          <polyline id="trend-path" points="0,100 300,100"></polyline>
        </svg>
      </div>

      <h2 style="font-size: 16px; font-weight: 600; margin-top: 15px; color: var(--text-muted);">明细流水清单</h2>
      <div id="recent-list" class="recent-list">
        </div>
    </div>

  </div>

  <div id="input-sheet" class="glass-panel bottom-sheet">
    <div class="sheet-handle"></div>
    <div id="sheet-title" style="font-size: 20px; font-weight: 700; margin-bottom: 24px;">确认账目明细</div>
    
    <div class="input-group">
      <label>消费项目 / 标签</label>
      <input type="text" id="input-label" class="glass-input" placeholder="例如：打车、火锅">
    </div>
    
    <div class="input-group">
      <label>消费数额 (元)</label>
      <input type="number" inputmode="decimal" id="input-amount" class="glass-input" placeholder="0.00">
    </div>

    <div class="button-row">
      <button class="btn btn-secondary" onclick="closeInputSheet()">取消</button>
      <button class="btn btn-primary" onclick="submitTransaction()">确认入账</button>
    </div>
  </div>

  <script>
    /* =========================================
       State Management & Core Logic
       ========================================= */
    let currentPin = '';
    const systemPin = '0000'; // 强制默认密码 0000
    let isRecording = false;
    let recordingTimeout = null;
    
    // In-Memory Data Store (CRUD Ready)
    let transactions = [
      { id: 1, label: '星巴克咖啡', amount: 28.00, time: '09:15' },
      { id: 2, label: '滴滴打车', amount: 45.50, time: '14:32' },
      { id: 3, label: '午餐椰子鸡', amount: 120.00, time: '12:10' }
    ];
    let editingId = null; // Tracks if we are editing an existing item

    // PIN Authentication Flow
    function inputPin(num) {
      if (currentPin.length < 4) {
        currentPin += num;
        updatePinDisplay();
      }
      if (currentPin.length === 4) {
        setTimeout(() => {
          if (currentPin === systemPin) {
            switchView('record');
            currentPin = ''; updatePinDisplay();
          } else {
            document.getElementById('pin-message').innerText = "密码错误，请重新输入";
            document.getElementById('pin-message').style.color = "var(--accent-red)";
            currentPin = ''; updatePinDisplay();
            setTimeout(() => {
              document.getElementById('pin-message').style.color = "var(--text-muted)";
              document.getElementById('pin-message').innerText = "请输入安全校验码";
            }, 1200);
          }
        }, 150);
      }
    }
    function clearPin() { currentPin = ''; updatePinDisplay(); }
    function updatePinDisplay() {
      const dots = document.querySelectorAll('.pin-dot');
      dots.forEach((dot, idx) => {
        if (idx < currentPin.length) dot.classList.add('filled');
        else dot.classList.remove('filled');
      });
    }
    function lockApp() { switchView('pin'); }

    // Controlled Recording Sequence (Solves "Too Fast" issues)
    function handleRecordClick() {
      const btn = document.getElementById('record-btn');
      const text = document.getElementById('record-text');
      
      if (!isRecording) {
        // Start Recording Simulation
        isRecording = true;
        btn.classList.add('recording');
        text.innerText = "倾听中...";
        // Precision control: Max out at 6s if user doesn't tap again
        recordingTimeout = setTimeout(() => { if(isRecording) handleRecordClick(); }, 6000);
      } else {
        // Stop Recording and Parse
        clearTimeout(recordingTimeout);
        isRecording = false;
        btn.classList.remove('recording');
        text.innerText = "轻触开始";
        
        // Mock parsing results based on common inputs
        const mockPool = [
          { label: '数字尾巴数码', amount: 299.00 },
          { label: '全家便利店', amount: 18.50 },
          { label: '太二酸菜鱼', amount: 168.00 }
        ];
        const selected = mockPool[Math.floor(Math.random() * mockPool.length)];
        openInputSheet(false, selected.label, selected.amount);
      }
    }

    // Sheet Controller (Add & Edit Form)
    function openInputSheet(isEdit = false, label = '', amount = '', id = null) {
      editingId = id;
      document.getElementById('sheet-title').innerText = isEdit ? "修改账目流水" : "确认账目明细";
      document.getElementById('input-label').value = label;
      document.getElementById('input-amount').value = amount;
      document.getElementById('input-sheet').classList.add('show');
    }
    function closeInputSheet() {
      document.getElementById('input-sheet').classList.remove('show');
      editingId = null;
    }

    // CRUD - Create & Update
    function submitTransaction() {
      const label = document.getElementById('input-label').value.trim();
      const amount = parseFloat(document.getElementById('input-amount').value);
      
      if (!label || isNaN(amount) || amount <= 0) {
        alert("请输入精准的项目名称与有效金额");
        return;
      }

      if (editingId) {
        // Update operation
        transactions = transactions.map(item => 
          item.id === editingId ? { ...item, label, amount } : item
        );
      } else {
        // Create operation
        const now = new Date();
        const timeStr = `${String(now.getHours()).padStart(2, '0')}:${String(now.getMinutes()).padStart(2, '0')}`;
        transactions.unshift({
          id: Date.now(),
          label,
          amount,
          time: timeStr
        });
      }

      closeInputSheet();
      refreshDashboardData();
    }

    // CRUD - Delete
    function deleteTransaction(id) {
      transactions = transactions.filter(item => item.id !== id);
      refreshDashboardData();
    }

    // Pure Navigation Switcher
    function switchView(viewId) {
      document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
      document.getElementById(`view-${viewId}`).classList.add('active');
    }
    function goToDashboard() {
      switchView('dashboard');
      refreshDashboardData();
    }
    function goBackToRecord() { switchView('record'); }

    // Data Engine & Dynamic Chart Generator
    function refreshDashboardData() {
      const listContainer = document.getElementById('recent-list');
      const totalDisplay = document.getElementById('total-expense-display');
      
      listContainer.innerHTML = '';
      let total = 0;

      if (transactions.length === 0) {
        listContainer.innerHTML = `<div class="text-body" style="text-align:center; margin-top:40px;">暂无明细流水，请开始记账</div>`;
        totalDisplay.innerText = `¥ 0.00`;
        document.getElementById('trend-path').setAttribute('points', '0,100 300,100');
        return;
      }

      transactions.forEach(item => {
        total += item.amount;
        const card = document.createElement('div');
        card.className = 'glass-panel list-item';
        card.innerHTML = `
          <div>
            <div style="font-weight: 600; font-size:16px;">${item.label}</div>
            <div class="text-body" style="font-size:12px; margin-top:4px;">${item.time}</div>
          </div>
          <div style="display:flex; align-items:center;">
            <div style="font-weight: 700; font-size:16px;">- ¥ ${item.amount.toFixed(2)}</div>
            <div class="item-actions">
              <span class="action-icon action-edit" onclick="openInputSheet(true, '${item.label}', ${item.amount}, ${item.id})">改</span>
              <span class="action-icon action-delete" onclick="deleteTransaction(${item.id})">删</span>
            </div>
          </div>
        `;
        listContainer.appendChild(card);
      });

      totalDisplay.innerText = `¥ ${total.toLocaleString('zh-CN', { minimumFractionDigits: 2 })}`;
      
      // Sync Render Polyline based on actual values
      const path = document.getElementById('trend-path');
      const maxAmt = Math.max(...transactions.map(t => t.amount), 1);
      let points = [];
      // Deep Copy and reverse to show timeline chronological sequence left-to-right
      const timelineData = [...transactions].reverse();
      timelineData.forEach((item, index) => {
        let x = timelineData.length > 1 ? (index / (timelineData.length - 1)) * 300 : 150;
        // Map amount to standard height 100 where higher expense means a higher graph point (lower Y coordinate)
        let y = 90 - (item.amount / maxAmt) * 70; 
        points.push(`${x},${y}`);
      });
      path.setAttribute('points', points.join(' '));
    }
  </script>
</body>
</html>
